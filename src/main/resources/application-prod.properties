# Server Configuration
server.port=${PORT:3636}

# MySQL Database Configuration - Railway Production
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration - FIXED DIALECT
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Remove the deprecated dialect - let Hibernate auto-detect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect  ← REMOVE THIS LINE

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Logging
logging.level.com.BankingApplications=INFO
logging.level.org.hibernate=WARN